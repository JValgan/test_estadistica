<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Estadística · Qüestionari per temes (300 preguntes)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f2eb;
            font-family: 'Segoe UI', 'Roboto', Georgia, 'Times New Roman', serif;
            padding: 2rem 1rem;
            color: #2c2a28;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: #fffef8;
            border-radius: 1rem;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.04);
            border: 1px solid #e3dbcf;
            overflow: hidden;
        }

        .header {
            background: #f9f6f0;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid #e3dbcf;
        }

        .header h1 {
            font-size: 1.7rem;
            font-weight: 500;
            letter-spacing: -0.2px;
            color: #3b3730;
            margin-bottom: 0.2rem;
        }

        .header p {
            font-size: 0.85rem;
            color: #6b655a;
        }

        .temes-panel {
            background: #fefcf8;
            padding: 1.5rem;
            border-bottom: 1px solid #e8e0d3;
        }

        .temes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
            margin-bottom: 1.8rem;
        }

        .tema-card {
            background: #ffffff;
            border: 1px solid #e2d9ce;
            border-radius: 0.5rem;
            padding: 0.9rem 1rem;
        }

        .tema-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.7rem;
        }

        .tema-header input {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }

        .tema-header label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #3b3730;
            cursor: pointer;
        }

        .tema-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tema-controls span {
            font-size: 0.7rem;
            color: #7a7265;
        }

        .tema-controls input {
            width: 70px;
            padding: 0.3rem 0.4rem;
            border: 1px solid #ddd2c4;
            border-radius: 2rem;
            text-align: center;
            font-size: 0.8rem;
            background: #fffef8;
        }

        .tema-controls input:disabled {
            background: #f4f0ea;
            color: #b0a89b;
        }

        .config-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #e2d9ce;
            color: #3b3730;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.85rem;
            font-family: inherit;
        }

        button:hover {
            background: #d1c7b8;
        }

        .btn-primary {
            background: #c9bcab;
            color: #2b2a27;
        }

        .btn-primary:hover {
            background: #b8aa97;
        }

        .stats-bar {
            background: #fefcf8;
            padding: 0.6rem 1.5rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            border-bottom: 1px solid #ede5da;
            color: #5a554b;
        }

        .questions-area {
            padding: 1.5rem;
            max-height: 65vh;
            overflow-y: auto;
            background: #fffef8;
        }

        .question {
            background: #ffffff;
            border: 1px solid #ece3d9;
            border-radius: 1rem;
            padding: 1rem 1.3rem;
            margin-bottom: 1.2rem;
        }

        .question-text {
            font-weight: 500;
            font-size: 0.92rem;
            margin-bottom: 0.9rem;
            line-height: 1.4;
            color: #3b3730;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .option {
            background: #fffefa;
            border: 1px solid #e2d9ce;
            border-radius: 2rem;
            padding: 0.45rem 1.2rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.1s;
            color: #2c2a28;
        }

        .option:hover {
            background: #f4f0ea;
            border-color: #c9bcab;
        }

        .option.selected {
            background: #e8dfd3;
            border-color: #b2a695;
            color: #2c2a28;
        }

        .feedback {
            margin-top: 0.6rem;
            font-size: 0.72rem;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
        }

        .feedback-correct {
            background: #eef3e8;
            color: #3f5a2e;
            border-left: 3px solid #8fbc6e;
        }

        .feedback-wrong {
            background: #fdf1ef;
            color: #aa6f64;
            border-left: 3px solid #d9a79b;
        }

        .submit-area {
            text-align: center;
            padding: 1rem 1.5rem;
            border-top: 1px solid #ede5da;
            background: #fefcf8;
        }

        .score-badge {
            background: #e8dfd3;
            color: #3b3730;
            padding: 0.6rem;
            border-radius: 3rem;
            font-weight: 500;
            margin-top: 0.6rem;
            display: inline-block;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #a59c8e;
            padding: 0.8rem;
        }

        @media (max-width: 700px) {
            .temes-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>

            options: probOpcions[i % probOpcions.length],
            correct: 1
        });
    }

    // ========== 3. DISTRIBUCIONS (50 preguntes) ==========
    for (let i = 1; i <= 50; i++) {
        TEMES.distribucions.preguntes.push({
            text: i % 5 === 0 ? "La distribució normal estàndard N(0,1) té mitjana i desviació:"
                : (i % 4 === 0 ? "En una N(100,15), quin valor deixa un 10% per sota?"
                : (i % 3 === 0 ? "Per aproximar una binomial per normal, condició:"
                : "En una N(0,1), P(Z ≤ 1.96) és:")),
            options: ["0 i 1", "1 i 0", "100 i 15", "0 i 0"],
            correct: 0
        });
    }

    // ========== 4. INTERVALS DE CONFIANÇA (50 preguntes) ==========
    for (let i = 1; i <= 50; i++) {
        TEMES.intervals.preguntes.push({
            text: i % 3 === 0 ? "Si augmentem la mida mostral, l’amplada de l’interval:"
                : (i % 4 === 0 ? "L’interval per a la proporció és:"
                : "zα/2 per al 95% de confiança és:"),
            options: i % 3 === 0 ? ["Disminueix", "Augmenta", "Es manté", "Es duplica"]
                : (i % 4 === 0 ? ["p̂ ± z·√(p̂(1-p̂)/n)", "p̂ ± t·√(p̂(1-p̂)/n)", "p̂ ± z·p̂(1-p̂)", "p̂ ± z·√(p(1-p)/n)"]
                : ["1.645", "1.96", "2.33", "2.576"]),
            correct: 0
        });
    }

    // ========== 5. CONTRASTOS D'HIPÒTESI (50 preguntes) ==========
    for (let i = 1; i <= 50; i++) {
        TEMES.contrastos.preguntes.push({
            text: i % 3 === 0 ? "L’error de tipus I consisteix a:"
                : (i % 4 === 0 ? "El nivell de significació α és la probabilitat de:"
                : "Si el p-valor és menor que α, es:"),
            options: i % 3 === 0 ? ["Rebutjar H0 sent certa", "Acceptar H0 sent falsa", "Rebutjar H1 sent certa", "Acceptar H1 sent falsa"]
                : (i % 4 === 0 ? ["Error tipus I", "Error tipus II", "Error mostral", "Error sistemàtic"]
                : ["Rebutja H0", "Accepta H0", "Augmenta mostra", "Canvia α"]),
            correct: 0
        });
    }

    // ========== 6. EPIDEMIOLOGIA (50 preguntes) ==========
    for (let i = 1; i <= 50; i++) {
        TEMES.epidemiologia.preguntes.push({
            text: i % 3 === 0 ? "L’odds ratio (OR) es calcula com:"
                : (i % 4 === 0 ? "Si OR = 2.5, vol dir:"
                : "L’OR s’utilitza principalment en:"),
            options: i % 3 === 0 ? ["(a/b)/(c/d)", "a/(a+b)", "a/c", "a+d"]
                : (i % 4 === 0 ? ["Factor de risc", "Factor protector", "No associació", "Risc zero"]
                : ["Estudis de casos i controls", "Cohorts", "Transversals", "Assaigs clínics"]),
            correct: 0
        });
    }

    // ======================== LÒGICA DEL QUIZ ========================
    let currentQuestions = [];
    let userAnswers = [];
    let quizActive = false;
    let totalSelected = 0;

    const temesGrid = document.getElementById('temesGrid');
    const generarBtn = document.getElementById('generarQuizBtn');
    const seleccionarTot = document.getElementById('seleccionarTot');
    const desseleccionarTot = document.getElementById('desseleccionarTot');
    const quizPanel = document.getElementById('quizPanel');
    const questionsArea = document.getElementById('questionsArea');
    const answeredSpan = document.getElementById('answeredCount');
    const totalSpan = document.getElementById('totalCount');
    const correctSpan = document.getElementById('correctCount');
    const checkBtn = document.getElementById('checkBtn');
    const resultDiv = document.getElementById('resultDisplay');

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function shuffleOptions(q) {
        const correctText = q.options[q.correct];
        const shuffled = shuffleArray([...q.options]);
        const newCorrect = shuffled.findIndex(opt => opt === correctText);
        return { text: q.text, options: shuffled, correct: newCorrect };
    }

    function crearSelectors() {
        let html = '';
        for (const [id, tema] of Object.entries(TEMES)) {
            html += `
                <div class="tema-card">
                    <div class="tema-header">
                        <input type="checkbox" id="chk_${id}" data-tema="${id}">
                        <label for="chk_${id}">${tema.nom}</label>
                    </div>
                    <div class="tema-controls">
                        <span>${tema.preguntes.length} preguntes</span>
                        <input type="number" id="num_${id}" min="0" max="${tema.preguntes.length}" value="0" step="1" disabled>
                    </div>
                </div>
            `;
        }
        temesGrid.innerHTML = html;
        for (const [id, tema] of Object.entries(TEMES)) {
            const chk = document.getElementById(`chk_${id}`);
            const input = document.getElementById(`num_${id}`);
            chk.addEventListener('change', () => {
                if (chk.checked) {
                    input.disabled = false;
                    input.value = Math.min(5, tema.preguntes.length);
                } else {
                    input.disabled = true;
                    input.value = 0;
                }
            });
        }
    }

    seleccionarTot.addEventListener('click', () => {
        for (const [id, tema] of Object.entries(TEMES)) {
            const chk = document.getElementById(`chk_${id}`);
            const input = document.getElementById(`num_${id}`);
            chk.checked = true;
            input.disabled = false;
            input.value = Math.min(10, tema.preguntes.length);
        }
    });

    desseleccionarTot.addEventListener('click', () => {
        for (const [id, tema] of Object.entries(TEMES)) {
            const chk = document.getElementById(`chk_${id}`);
            const input = document.getElementById(`num_${id}`);
            chk.checked = false;
            input.disabled = true;
            input.value = 0;
        }
    });

    function generarQuiz() {
        let preguntesTriades = [];
        for (const [id, tema] of Object.entries(TEMES)) {
            const chk = document.getElementById(`chk_${id}`);
            if (chk && chk.checked) {
                let quantitat = parseInt(document.getElementById(`num_${id}`).value) || 0;
                if (quantitat > 0) {
                    const copia = [...tema.preguntes];
                    const barrejades = shuffleArray(copia);
                    preguntesTriades.push(...barrejades.slice(0, Math.min(quantitat, tema.preguntes.length)));
                }
            }
        }
        if (preguntesTriades.length === 0) {
            alert("Selecciona algun tema i indica quantes preguntes vols.");
            return false;
        }
        preguntesTriades = shuffleArray(preguntesTriades);
        currentQuestions = preguntesTriades.map(q => shuffleOptions(q));
        totalSelected = currentQuestions.length;
        userAnswers = new Array(totalSelected).fill(null);
        renderQuestions();
        quizActive = true;
        quizPanel.style.display = 'block';
        correctSpan.innerText = '0';
        resultDiv.innerHTML = '';
        return true;
    }

    function renderQuestions() {
        let html = '';
        currentQuestions.forEach((q, idx) => {
            const selected = userAnswers[idx];
            html += `<div class="question">
                        <div class="question-text">${idx+1}. ${q.text}</div>
                        <div class="options" id="opts-${idx}">`;
            q.options.forEach((opt, optIdx) => {
                const letter = String.fromCharCode(65+optIdx);
                const selClass = (selected === optIdx) ? 'selected' : '';
                html += `<div class="option ${selClass}" data-opt="${optIdx}">${letter}. ${opt}</div>`;
            });
            html += `</div><div class="feedback" id="fb-${idx}"></div></div>`;
        });
        questionsArea.innerHTML = html;

        for (let i = 0; i < currentQuestions.length; i++) {
            const optsDiv = document.getElementById(`opts-${i}`);
            if (!optsDiv) continue;
            const opts = optsDiv.querySelectorAll('.option');
            opts.forEach(opt => {
                opt.addEventListener('click', () => {
                    if (!quizActive) return;
                    const optVal = parseInt(opt.dataset.opt);
                    userAnswers[i] = optVal;
                    opts.forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    const fbDiv = document.getElementById(`fb-${i}`);
                    if (fbDiv) fbDiv.innerHTML = '';
                    updateStats();
                });
            });
        }
        updateStats();
    }

    function updateStats() {
        const answered = userAnswers.filter(a => a !== null).length;
        answeredSpan.innerText = answered;
        totalSpan.innerText = totalSelected;
    }

    function computeScore() {
        let correct = 0;
        for (let i = 0; i < currentQuestions.length; i++) {
            const user = userAnswers[i];
            const correctIdx = currentQuestions[i].correct;
            const fbDiv = document.getElementById(`fb-${i}`);
            if (!fbDiv) continue;
            if (user === null) {
                fbDiv.innerHTML = `<div class="feedback feedback-wrong">Sense respondre. Correcta: ${String.fromCharCode(65+correctIdx)}. ${currentQuestions[i].options[correctIdx]}</div>`;
            } else if (user === correctIdx) {
                correct++;
                fbDiv.innerHTML = `<div class="feedback feedback-correct">Correcte</div>`;
            } else {
                fbDiv.innerHTML = `<div class="feedback feedback-wrong">Incorrecte. Correcta: ${String.fromCharCode(65+correctIdx)}. ${currentQuestions[i].options[correctIdx]}</div>`;
            }
        }
        correctSpan.innerText = correct;
        const percent = (correct / totalSelected * 100).toFixed(1);
        resultDiv.innerHTML = `<div class="score-badge">Puntuació: ${correct}/${totalSelected} (${percent}%)</div>`;
        quizActive = false;
    }

    generarBtn.addEventListener('click', () => {
        if (generarQuiz()) quizPanel.scrollIntoView({ behavior: 'smooth' });
    });
    checkBtn.addEventListener('click', () => {
        if (currentQuestions.length === 0) return;
        computeScore();
        quizActive = false;
    });

    crearSelectors();
</script>
</body>
</html>
